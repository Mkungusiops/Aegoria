apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegoria-console
  namespace: aegoria
  labels:
    app.kubernetes.io/name: aegoria-console
    app.kubernetes.io/part-of: aegoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aegoria-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegoria-console
        app.kubernetes.io/part-of: aegoria
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: console
          # Replace with your registry-pushed image
          # (built from deploy/Dockerfile.console with context = repo root).
          image: aegoria/console:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            # The console ships fixtures and renders standalone. To drive it
            # from the live control-plane API, uncomment and point at the API
            # Service DNS name in this namespace:
            # - name: AEGORIA_API_URL
            #   value: http://aegoria-api:8000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aegoria-console
  namespace: aegoria
  labels:
    app.kubernetes.io/name: aegoria-console
    app.kubernetes.io/part-of: aegoria
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegoria-console
  ports:
    - name: http
      port: 3000
      targetPort: http
