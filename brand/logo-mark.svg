<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aegoria mark">
  <defs>
    <linearGradient id="auralis" x1="14" y1="20" x2="82" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16E0C4"/>
      <stop offset="0.55" stop-color="#21D6C9"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#EAFFFB"/>
      <stop offset="0.4" stop-color="#16E0C4"/>
      <stop offset="1" stop-color="#0BA98F"/>
    </radialGradient>
  </defs>
  <!-- lens / planet ring -->
  <circle cx="48" cy="48" r="40" stroke="#16E0C4" stroke-opacity="0.14" stroke-width="1.5"/>
  <!-- aperture blades (three arcs converging) -->
  <g stroke="url(#auralis)" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 22.02 33 A 30 30 0 0 1 78 48" transform="rotate(0 48 48)"/>
    <path d="M 22.02 33 A 30 30 0 0 1 78 48" transform="rotate(120 48 48)"/>
    <path d="M 22.02 33 A 30 30 0 0 1 78 48" transform="rotate(240 48 48)"/>
  </g>
  <!-- data nodes at blade tips -->
  <g fill="#16E0C4">
    <circle cx="78" cy="48" r="3.4" transform="rotate(0 48 48)"/>
    <circle cx="78" cy="48" r="3.4" transform="rotate(120 48 48)"/>
    <circle cx="78" cy="48" r="3.4" transform="rotate(240 48 48)"/>
  </g>
  <!-- luminous core -->
  <circle cx="48" cy="48" r="12" fill="#16E0C4" fill-opacity="0.10"/>
  <circle cx="48" cy="48" r="7.5" fill="url(#core)"/>
</svg>
